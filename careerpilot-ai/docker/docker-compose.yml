version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    volumes:
      - careerpilot_data:/app/data
      - chroma_data:/app/chroma_db
    environment:
      - DATABASE_URL=sqlite:////app/data/careerpilot.db
      - CHROMA_PERSIST_DIR=/app/chroma_db

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - API_BASE_URL=http://backend:8000

volumes:
  careerpilot_data:
  chroma_data:
